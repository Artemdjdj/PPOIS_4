{% extends 'layouts/base.html' %}
{% load static %}

{% block main %}
<main class="d-flex flex-column" style="flex: 1;">
    <div class="container-fluid px-0 d-flex flex-column flex-fill">
        <div class="row g-0 flex-fill">
            <div class="col-12 position-relative p-5">
                <div style="margin-bottom:20px; text-align:center">
                    <h1>Настройки садового участка</h1>
                </div>
                <form class="row g-3">
                    <div class="col-12">
                        <label for="square">Площадь (м^2)</label>
                        <input type="number" class="form-control" id="square_id" name="square"
                            step="1" min="0" max="100000"
                            value="0">
                    </div>
                    <div class="col-12">
                        <label for="diameter">Периметр (м)</label>
                        <input type="number" class="form-control" id="perimeter_id" name="perimeter"
                            step="1" min="0" max="100000"
                            value="0">
                    </div>
                    <div class="col-12">
                        <label for="inputState" class="form-label">Тип почвы</label>
                        <select id="inputState" class="form-select">
                        <option selected>Choose...</option>
                        <option>...</option>
                        </select>
                    </div>
                    <div style="display:flex; flex-wrap:nowrap; margin-right:auto; gap:20px;">
                        <button type="submit" class="btn btn-info">Сохранить изменения</button>
                        <button type="submit" class="btn btn-danger">Отмена</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</main>
{% endblock main %}

{% block cards %}
{% endblock cards %}
